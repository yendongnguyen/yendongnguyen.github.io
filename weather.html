<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header>
        <h1>Weather App</h1>
        <p>Current weather data from a public API.</p>
    </header>

    <nav>
        <a href="index.html">Back to Portfolio</a>
    </nav>

    <main>
        <section>
            <h2>Select a City</h2>
            <button id="btnKuopio">Kuopio</button>
            <button id="btnHelsinki">Helsinki</button>
            <button id="btnOulu">Oulu</button>
        </section>

        <section id="weatherBox">
            <h2>Weather Information</h2>
            <p><strong>City:</strong> <span id="city">-</span></p>
            <p><strong>Temperature:</strong> <span id="temperature">-</span></p>
            <p><strong>Wind Speed:</strong> <span id="wind">-</span></p>
            <p><strong>Time:</strong> <span id="time">-</span></p>
        </section>

        <pre id="output"></pre>
    </main>

    <footer>
        <p><a href="index.html">Back to Portfolio</a></p>
    </footer>

    <script src="weather.js"></script>
</body>
</html>
